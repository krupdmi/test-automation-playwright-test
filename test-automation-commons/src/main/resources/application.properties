# ─────────────────────────────────────────────────────────────────────────────
# Base application properties
# Environment-specific values live in application-{env}.properties
# ──────────────────────────────────────────────────────────────────────────

# Set active profiles
spring.profiles.active=

spring.main.banner-mode=off
spring.main.allow-bean-definition-overriding=true
spring.main.allow-circular-references=true
debug=false

# JPA
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Parallel execution — single source of truth, override with -Dparallel.threads=N
parallel.threads=4

# User pool — comma-separated test account usernames
# test.users=user1,user2,user3,user4
# test.users.password=password

# Tag-specific user pools
# test.users.pool.admin=admin1,admin2

# API timeout (ms)
spring.api.timeout=30000

# Retry
test.retry.count=1

# Playwright
browser.headless=false
browser.debug.base.port=9222
# browser.blocked.urls=**/analytics/**,**/tracking/**

# Redis retry
redis.retry.max-attempts=3
redis.retry.delay-ms=1000
