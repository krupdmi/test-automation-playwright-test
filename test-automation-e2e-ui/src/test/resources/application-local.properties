# ─────────────────────────────────────────────────────────────────────────────
# Local environment overrides for UI tests
# Do NOT commit real credentials or environment URLs.
# ─────────────────────────────────────────────────────────────────────────────

# Application URLs
# ui.base-url.app=http://localhost:3000
# ui.base-url.admin=http://localhost:3001

# Database (only needed if UI tests verify DB state)
# spring.datasource.url=jdbc:postgresql://localhost:5432/testdb
# spring.datasource.username=<your_db_user>
# spring.datasource.password=<your_db_password>
# spring.datasource.driver-class-name=org.postgresql.Driver

# Redis (only needed if UI tests verify Redis state)
# spring.data.redis.host=localhost
# spring.data.redis.port=6379
# spring.data.redis.password=
# spring.data.redis.database=0

# Test users
# test.users=ui_user1,ui_user2
# test.users.password=<your_test_password>

# Playwright — disable headless for local debugging
# browser.headless=false
# browser.blocked.urls=**/analytics/**,**/tracking/**

# Parallelism
# parallel.threads=2
