# Active profiles — endpoints profile always loaded; environment profile set at runtime
# Override with: -Dspring.profiles.active=dev,endpoints
spring.profiles.active=local,endpoints

spring.main.allow-bean-definition-overriding=true
spring.main.allow-circular-references=true
spring.main.banner-mode=off

# JPA — disable for API-only runs if no DB is needed
spring.jpa.show-sql=false

# Parallel execution
parallel.threads=4

# Retry
test.retry.count=1
